[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cotainr"
dynamic = ["version"]
description = "A user space Apptainer/Singularity container builder"
readme = "README.md"
requires-python = ">=3.8"
license = "EUPL-1.2"
keywords = []
authors = [
  { name = "DeiC" },
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.8",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: Implementation :: CPython",
  "Programming Language :: Python :: Implementation :: PyPy",
]
dependencies = []

[project.optional-dependencies]
test = [
  "pytest>=8",
  "pytest-cov>=5",
]
docs = [
  "myst-parser>=2.0.0",
  "numpydoc>=1.5.0",
  "pydata-sphinx-theme>=0.13.3",
  "sphinx-design>=0.5.0",
  "sphinx>=7.2.5",
]

[project.scripts]
cotainr = "cotainr.cli:main"

[project.urls]
Documentation = "https://github.com/DeiC-HPC/cotainr#readme"
Issues = "https://github.com/DeiC-HPC/cotainr/issues"
Source = "https://github.com/DeiC-HPC/cotainr"

[tool.hatch.version]
path = "cotainr/__init__.py"

[tool.pytest.ini_options]
minversion = "6.0"
addopts = [
  "--cov",
  "--cov-report=html",
  "--cov-report=term-missing",
  "-l",
  "-ra",
]
testpaths = "cotainr/tests"
junit_suite_name = "cotainr_test_suite"
markers = [
  "conda_integration: marks tests of integration with conda/mamba",
  "endtoend: marks end-to-end test cases",
  "singularity_integration: marks tests of integration with singularity",
]
