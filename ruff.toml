target-version = "py38"
line-length = 88

[lint]
select = [
    "B", # flake8-bugbear
    "D", # docstrings
    "E", # pycodestyle errors
    "F", # Pyflakes
    "I", # isort
    "UP", # pyupgrade
    "W", # pycodestyle warnings
]
ignore = [
    "E501", # ignore line length; auto-formatting will take care of what it can.
]
exclude = [
    "examples/**/*.ipynb",
]

[lint.extend-per-file-ignores]
"cotainr/tests/**/test_*.py" = [
    # The non-standard way to import py.test fixtures in
    # tests means we will need to ignore "imported but not used"
    # as well as argument shadowing tests in test modules.
    "F401",
    "F811",
]
"cotainr/tests/**.py" = [
    "D", # docstrings not required in tests
    "S101", # assertions are OK in tests
]
"examples/**" = [
    "D", # docstrings not required in examples
]
"bin/*" = [
    "D", # docstrings not required in stubs
]

[lint.pydocstyle]
convention = "numpy"

[format]
exclude = [
    "examples/**/*.ipynb",
]
